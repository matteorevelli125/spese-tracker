<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>Spese</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INSERIMENTO -->
<section id="view-add" class="view active">
  <div class="card">
    <input id="amountInput" type="text" inputmode="decimal" placeholder="0,00 €" autocomplete="off">
  </div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="sub-list" id="subList"></div>
  <div class="row">
    <input type="date" id="dateInput">
    <input type="text" id="noteInput" placeholder="Nota (opzionale)">
  </div>
  <button class="btn-primary" id="saveBtn" disabled>Salva spesa</button>
</section>

<!-- MOVIMENTI -->
<section id="view-list" class="view">
  <h2>Movimenti</h2>
  <div id="expList"></div>
</section>

<!-- STATISTICHE -->
<section id="view-stats" class="view">
  <div class="period-bar">
    <button id="prevPeriod">‹</button>
    <select id="periodType">
      <option value="day">Giorno</option>
      <option value="week">Settimana</option>
      <option value="month" selected>Mese</option>
      <option value="year">Anno</option>
    </select>
    <button id="nextPeriod">›</button>
  </div>
  <div class="period-label" id="periodLabel"></div>
  <div class="card">
    <div class="total-big" id="statTotal">0,00 €</div>
    <div class="compare" id="statCompare"></div>
  </div>
  <div class="filter-chips" id="filterChips"></div>
  <div class="card">
    <h2 style="margin-top:0" id="breakdownTitle">Per categoria</h2>
    <div id="catBars"></div>
  </div>
  <div class="card">
    <h2 style="margin-top:0">Andamento</h2>
    <div class="trend" id="trendChart"></div>
  </div>
</section>

<!-- BUDGET -->
<section id="view-budget" class="view">
  <h2>Budget mensili — <span id="budgetMonthLabel"></span></h2>
  <div class="card" id="budgetProgress"></div>
  <h2>Imposta budget per categoria</h2>
  <div class="card" id="budgetEditor"></div>
</section>

<!-- IMPOSTAZIONI -->
<section id="view-settings" class="view">
  <h2>Spese ricorrenti</h2>
  <div class="card">
    <div id="recList"></div>
    <div class="row"><input type="text" id="recName" placeholder="Nome (es. Netflix)"></div>
    <div class="row">
      <input type="number" id="recAmount" placeholder="Importo €" inputmode="decimal" step="0.01" min="0">
      <select id="recFreq">
        <option value="monthly">Mensile</option>
        <option value="yearly">Annuale</option>
      </select>
    </div>
    <div class="row">
      <select id="recCat"></select>
      <select id="recSub"></select>
    </div>
    <div class="row">
      <input type="date" id="recStart" title="Prima scadenza">
    </div>
    <button class="btn-primary" id="recAddBtn">Aggiungi ricorrente</button>
  </div>
  <h2>Dati</h2>
  <div class="card">
    <div class="row">
      <button class="btn-secondary" id="exportJsonBtn" style="flex:1">Esporta JSON</button>
      <button class="btn-secondary" id="exportCsvBtn" style="flex:1">Esporta CSV</button>
    </div>
    <div class="row">
      <button class="btn-secondary" id="importBtn" style="flex:1">Importa backup JSON</button>
      <input type="file" id="importFile" accept=".json" hidden>
    </div>
    <div class="row" style="justify-content:center">
      <button class="btn-danger-link" id="wipeBtn">Cancella tutti i dati</button>
    </div>
  </div>
</section>

<nav>
  <button data-view="add" class="active"><span class="ico">➕</span>Aggiungi</button>
  <button data-view="list"><span class="ico">📋</span>Movimenti</button>
  <button data-view="stats"><span class="ico">📊</span>Statistiche</button>
  <button data-view="budget"><span class="ico">🎯</span>Budget</button>
  <button data-view="settings"><span class="ico">⚙️</span>Altro</button>
</nav>

<div class="toast" id="toast"></div>

<script src="categories.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
