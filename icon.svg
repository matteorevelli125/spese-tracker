<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(15 .5 .5)">
      <stop offset="0" stop-color="#1f9d63"/>
      <stop offset="1" stop-color="#0d6d43"/>
    </linearGradient>
  </defs>
  <!-- sfondo verde con angoli morbidi -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
