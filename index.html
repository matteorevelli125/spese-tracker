<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f9d63">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://accounts.google.com https://apis.google.com;
  connect-src 'self' https://www.googleapis.com https://accounts.google.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: blob:;
  frame-src https://accounts.google.com https://content.googleapis.com;
  base-uri 'self';
  object-src 'none';
  form-action 'self';
">
<title>Spese</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INSERIMENTO -->
<section id="view-add" class="view active">
  <h1 class="page-title" id="addTitle">Nuova spesa</h1>
  <div class="type-toggle" id="typeToggle">
    <button class="selected" data-type="expense">Uscita</button>
    <button data-type="income">Entrata</button>
  </div>
  <div class="amount-wrap">
    <div class="amount-label">IMPORTO</div>
    <input id="amountInput" type="text" inputmode="decimal" placeholder="0,00 €" autocomplete="off">
  </div>
  <div class="section-label">CATEGORIA</div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="section-label" id="subLabel" style="display:none">SOTTOCATEGORIA</div>
  <div class="sub-list" id="subList"></div>
  <div class="field-list">
    <label class="field-row"><span>Data</span><input type="date" id="dateInput"></label>
    <label class="field-row"><span>Nota</span><input type="text" id="noteInput" placeholder="opzionale"></label>
  </div>
  <button class="btn-primary" id="saveBtn" disabled>Salva spesa</button>
  <button class="btn-danger-link" id="deleteBtn" style="display:none;width:100%;margin-top:12px;padding:10px">Elimina movimento</button>
</section>

<!-- MOVIMENTI -->
<section id="view-list" class="view">
  <h1 class="page-title">Movimenti</h1>
  <input type="search" id="searchInput" placeholder="Cerca (categoria, nota, importo)…" autocomplete="off">
  <div id="expList"></div>
</section>

<!-- STATISTICHE -->
<section id="view-stats" class="view">
  <h1 class="page-title">Statistiche</h1>
  <div class="period-bar">
    <button id="prevPeriod">‹</button>
    <select id="periodType">
      <option value="day">Giorno</option>
      <option value="week">Settimana</option>
      <option value="month" selected>Mese</option>
      <option value="year">Anno</option>
    </select>
    <button id="nextPeriod">›</button>
  </div>
  <div class="period-label" id="periodLabel"></div>
  <div class="card">
    <div class="total-big" id="statTotal">0,00 €</div>
    <div class="compare" id="statCompare"></div>
    <div class="balance-row" id="statBalance"></div>
  </div>
  <div class="filter-chips" id="filterChips"></div>
  <div class="card">
    <h2 style="margin-top:0" id="breakdownTitle">Per categoria</h2>
    <div id="catBars"></div>
  </div>
  <div class="card">
    <h2 style="margin-top:0">Andamento</h2>
    <div class="trend" id="trendChart"></div>
  </div>
</section>

<!-- BUDGET -->
<section id="view-budget" class="view">
  <h1 class="page-title">Budget mensili</h1>
  <div class="summary-card" id="budgetSummary"></div>
  <div id="budgetProgress"></div>
  <h2>Imposta budget per categoria</h2>
  <div class="card" id="budgetEditor"></div>
</section>

<!-- IMPOSTAZIONI -->
<section id="view-settings" class="view">
  <h1 class="page-title">Altro</h1>
  <h2>Spese ricorrenti</h2>
  <div class="card">
    <div id="recList"></div>
    <div class="row"><input type="text" id="recName" placeholder="Nome (es. Netflix, Stipendio)"></div>
    <div class="row">
      <select id="recType">
        <option value="expense">Uscita</option>
        <option value="income">Entrata</option>
      </select>
      <input type="number" id="recAmount" placeholder="Importo €" inputmode="decimal" step="0.01" min="0">
      <select id="recFreq">
        <option value="monthly">Mensile</option>
        <option value="yearly">Annuale</option>
      </select>
    </div>
    <div class="row">
      <select id="recCat"></select>
      <select id="recSub"></select>
    </div>
    <div class="row">
      <input type="date" id="recStart" title="Prima scadenza">
    </div>
    <button class="btn-primary" id="recAddBtn">Aggiungi ricorrente</button>
  </div>
  <h2>Backup Google Drive</h2>
  <div class="card" id="driveCard">
    <div class="drive-status" id="driveStatus"></div>
    <div id="driveClientIdRow">
      <input type="text" id="driveClientIdInput" placeholder="Client ID …apps.googleusercontent.com" autocomplete="off" spellcheck="false">
      <div class="row">
        <button class="btn-secondary" id="driveClientIdSave" style="flex:1">Salva Client ID</button>
      </div>
    </div>
    <div class="row">
      <button class="btn-secondary" id="driveConnectBtn" style="flex:1">Connetti Google Drive</button>
      <button class="btn-secondary" id="driveBackupBtn" style="flex:1">Esegui backup ora</button>
    </div>
    <label class="field-row" id="driveAutoRow" style="margin-top:10px">
      <span>Backup automatico mensile</span>
      <input type="checkbox" id="driveAutoToggle" checked>
    </label>
    <div class="row" style="justify-content:center">
      <button class="btn-danger-link" id="driveClearIdBtn">Rimuovi Client ID</button>
    </div>
  </div>
  <h2>Dati</h2>
  <div class="card">
    <div class="row">
      <button class="btn-secondary" id="exportJsonBtn" style="flex:1">Esporta JSON</button>
      <button class="btn-secondary" id="exportCsvBtn" style="flex:1">Esporta CSV</button>
    </div>
    <div class="row">
      <button class="btn-secondary" id="importBtn" style="flex:1">Importa backup JSON</button>
      <input type="file" id="importFile" accept=".json" hidden>
    </div>
    <div class="row" style="justify-content:center">
      <button class="btn-danger-link" id="wipeBtn">Cancella tutti i dati</button>
    </div>
  </div>
</section>

<nav>
  <button data-view="add" class="active">
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Aggiungi
  </button>
  <button data-view="list">
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    Movimenti
  </button>
  <button data-view="stats">
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 20v-7M12 20V6M19 20v-10"/></svg>
    Statistiche
  </button>
  <button data-view="budget">
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
    Budget
  </button>
  <button data-view="settings">
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
    Altro
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="categories.js"></script>
<script src="db.js"></script>
<script src="drive-config.js"></script>
<script src="drive.js"></script>
<script src="app.js"></script>
</body>
</html>
